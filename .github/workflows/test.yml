# test on cpython and pypy
name: Tests

on:
  push:
    branches:
      - 'main'
  pull_request:

permissions: {}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-22.04
    permissions: {}
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "pypy3.10"
          - "3.11"
          - "pypy3.11"
          - "3.12"
          - "3.13"
          - "3.14"
      max-parallel: 7
      fail-fast: false
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.python-version }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - run: pipx install poetry==2.4.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      - run: poetry sync --only test

      - name: Run documentation tests 
        run: poetry run pytest --doctest-modules src

      - name: Run tests with coverage
        run: poetry run coverage run --source=src -m pytest

      - name: Publish coverage on workflow summary
        run: poetry run coverage report --format=markdown >> ${GITHUB_STEP_SUMMARY}
